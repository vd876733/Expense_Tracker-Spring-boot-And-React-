# Server Configuration
server.port=8081
server.servlet.context-path=/

# Application Name
spring.application.name=Personal Finance Tracker

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=varad

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud

# JWT Configuration
app.jwtSecret=${JWT_SECRET:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
app.jwtExpirationMs=86400000

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Google OAuth Configuration
app.googleClientId=${GOOGLE_CLIENT_ID:884510669054-acldripspk9ucf1kp50ad5qlv2l0fv6a.apps.googleusercontent.com}

# Gemini AI Configuration
gemini.api.key=
gemini.model=gemini-1.5-flash

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.financetracker=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Hibernate DDL Statistics
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.hibernate.ddl-auto=update